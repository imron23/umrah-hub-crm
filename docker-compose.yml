services:

  postgres:
    image: postgres:15-alpine
    container_name: umrah_hub_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: umrah_hub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - umrah_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: umrah_hub_redis
    ports:
      - "6379:6379"
    networks:
      - umrah_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: umrah-hub-api:latest
    container_name: umrah_hub_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=umrah_hub
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=change_me_in_production_32chars!!
    ports:
      - "8081:8081"
    networks:
      - umrah_net
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: umrah-hub-web:latest
    container_name: umrah_hub_web
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081/api/v1
    ports:
      - "5400:5400"
    networks:
      - umrah_net
    restart: unless-stopped

networks:
  umrah_net:
    driver: bridge

volumes:
  postgres_data:
